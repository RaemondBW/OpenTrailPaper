name: BikeGPSCompanion
options:
  bundleIdPrefix: cc.tdisplay
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "G5JFC849XY"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: NO
targets:
  BikeGPSCompanion:
    type: application
    platform: iOS
    sources:
      - Sources
    settings:
      base:
        INFOPLIST_FILE: Sources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: cc.tdisplay.bikegps
        TARGETED_DEVICE_FAMILY: "1"
        ENABLE_PREVIEWS: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_OBJC_BRIDGING_HEADER: Sources/BikeGPS-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - $(SRCROOT)/Sources/H3/include
        # H3 is third-party C; don't fail the build on its warnings.
        GCC_WARN_INHIBIT_ALL_WARNINGS: YES
