; Open e-paper bike computer for LilyGO T5S3 4.7" e-paper PRO
;
; Board definition and driver libraries come from the vendored LilyGO repo
; (vendor/T5S3-4.7-e-paper-PRO). Re-clone it if missing:
;   git clone --depth 1 https://github.com/Xinyuan-LilyGO/T5S3-4.7-e-paper-PRO vendor/T5S3-4.7-e-paper-PRO

[platformio]
default_envs = t5s3-pro
boards_dir = vendor/T5S3-4.7-e-paper-PRO/boards

[env:t5s3-pro]
platform = espressif32@6.5.0
board = T5-ePaper-S3
framework = arduino
upload_speed = 921600
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; No embedded fallback map: the device shows only maps downloaded to the SD
; card. (To restore a built-in base map, re-add:
;   board_build.embed_files = data/sf.ebm
; and the map_ebm_start/end load path in src/map_store.cpp.)

lib_extra_dirs =
    vendor/T5S3-4.7-e-paper-PRO/lib

lib_deps =
    Wire
    SPI
    h2zero/NimBLE-Arduino@^2.2.3

build_flags =
    -DBOARD_HAS_PSRAM
    -DPSRAM_SPEED=120MHz
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; USB-OTG (TinyUSB) mode instead of the board default USB-Serial-JTAG (=1),
    ; so the SD card can be exposed as USB Mass Storage. Serial/flashing still
    ; work over the native USB CDC. (Recover a bad flash via manual download
    ; mode: hold BOOT, tap RESET, then upload.)
    -UARDUINO_USB_MODE
    -DARDUINO_USB_MODE=0
    -DCORE_DEBUG_LEVEL=2
    -DDISABLE_ALL_LIBRARY_WARNINGS
    -Wl,--gc-sections
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=5
